# =====================================================================
# xiaozhouAgent — 单机部署编排（方案第十四/十八章）
# 默认 `docker compose up -d` 仅启动核心链路（core）：
#   caddy · console(Laravel) · orchestrator(Python) · postgres · redis
# 按需追加：
#   --profile storage       → minio（对象存储）
#   --profile observability → loki/prometheus/grafana/tempo
# 资源上限按 2C4G/60G 轻量云调校；升级到 4C8G 后可放宽。
# =====================================================================
services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - console
      - orchestrator
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25

  console:
    build: ./console
    env_file: .env
    environment:
      - APP_URL=http://${APP_URL_HOST:-localhost}
    volumes:
      # 注意：不要把 ./console 再挂载到 /var/www，否则会遮住镜像内 composer install 生成的 vendor/
      - ./.env:/var/www/.env
      # 用命名卷而非绑定挂载：命名卷首次会从镜像复制 storage/ 子目录
      # （framework/views 等），绑定挂载会用空主机目录遮住它们导致 Blade 编译失败
      - console_storage:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

  orchestrator:
    build: ./orchestrator
    env_file: .env
    volumes:
      # 注意：不要把 ./orchestrator 再挂载到 /app，否则会遮住镜像内 pip install 生成的依赖
      - ./config:/config:ro
      - ./data/projects:/data/projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - ./data/redis:/data
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25

  # ---- 可选：对象存储（--profile storage）----
  minio:
    image: minio/minio:latest
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

  # ---- 可观测性栈（Loki/Prometheus/Grafana）----
  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ./data/loki:/loki
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.5

  grafana:
    image: grafana/grafana:latest
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/default.json:ro
      - ./data/grafana:/var/lib/grafana
    depends_on: [loki, prometheus]
    networks: [appnet]
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.5

volumes:
  caddy_data:
  caddy_config:
  console_storage:

networks:
  appnet:
    driver: bridge
